name: release

# Fires when you push a version tag, e.g. `git tag v1.2.3 && git push origin v1.2.3`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create GitHub Releases
  packages: write # push images to GHCR

jobs:
  # Gate the release on a green test run.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  # Multi-arch image -> ghcr.io/<owner>/<repo>:<version> (+ :latest).
  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Prebuilt Linux x86_64 binary attached to the GitHub Release, for non-Docker hosts.
  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --bin waxwing-alert
      - name: Package binary
        run: |
          tar -czf "waxwing-alert-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz" \
            -C target/release waxwing-alert
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: waxwing-alert-*.tar.gz
          generate_release_notes: true
