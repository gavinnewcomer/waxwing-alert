# Run waxwing-alert with Docker Compose.
#
#   1. cp .env.example .env   # set DISCORD_TOKEN + EBIRD_ALERT_ENC_KEY (openssl rand -hex 32)
#   2. docker compose up -d   # builds locally, or pulls the image if you use the published one
#
# State (encrypted keys + subscriptions) persists in the named volume below.

services:
  ebird-alert:
    # Build from source locally. To use a published image instead, comment out `build`
    # and set `image: ghcr.io/gavinnewcomer/waxwing-alert:latest`.
    build: .
    image: waxwing-alert:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - waxwing-alert-state:/data

volumes:
  waxwing-alert-state:
